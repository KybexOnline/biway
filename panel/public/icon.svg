<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <style>
        /* Data Packet "Comet" Animations */
        .comet-forward { stroke-dasharray: 15 100; animation: flowForward 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .comet-reverse { stroke-dasharray: 15 100; animation: flowReverse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite 1s; }
        @keyframes flowForward { 0% { stroke-dashoffset: 115; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { stroke-dashoffset: -15; opacity: 0; } }
        @keyframes flowReverse { 0% { stroke-dashoffset: 115; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { stroke-dashoffset: -15; opacity: 0; } }
        
        /* Center Node Breathing Animation */
        .center-pulse { transform-origin: 100px 100px; animation: pulse 2.5s ease-in-out infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.85); filter: brightness(0.8); } 100% { transform: scale(1.15); filter: brightness(1.3); } }
    </style>
    <defs>
        <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="8" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        <linearGradient id="gradForward" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#10b981" /><stop offset="100%" stop-color="#06b6d4" /></linearGradient>
        <linearGradient id="gradReverse" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#8b5cf6" /><stop offset="100%" stop-color="#f43f5e" /></linearGradient>
    </defs>
    <g stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="100,40 160,100 100,160 40,100" fill="none" opacity="0.15" />
        <line x1="40" y1="100" x2="160" y2="100" opacity="0.3" />
        <line x1="100" y1="40" x2="100" y2="160" opacity="0.3" />
        <polygon points="100,70 130,100 100,130 70,100" fill="none" stroke-dasharray="3 5" opacity="0.5" />
    </g>
    <g stroke="url(#gradForward)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-light)">
        <path d="M 105,155 L 150,110 Q 160,100 150,90 L 105,45" stroke-width="9" />
        <path d="M 120,45 L 105,45 L 105,60" stroke-width="9" />
    </g>
    <g stroke="url(#gradReverse)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-light)">
        <path d="M 95,45 L 50,90 Q 40,100 50,110 L 95,155" stroke-width="9" />
        <path d="M 80,155 L 95,155 L 95,140" stroke-width="9" />
    </g>
    <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" filter="url(#glow-heavy)">
        <path class="comet-forward" pathLength="100" d="M 105,155 L 150,110 Q 160,100 150,90 L 105,45" />
        <path class="comet-reverse" pathLength="100" d="M 95,45 L 50,90 Q 40,100 50,110 L 95,155" />
    </g>
    <g fill="#0f172a" stroke="#64748b" stroke-width="2">
        <circle cx="100" cy="40" r="3.5" /><circle cx="100" cy="160" r="3.5" /><circle cx="40" cy="100" r="3.5" /><circle cx="160" cy="100" r="3.5" />
        <circle cx="100" cy="70" r="2.5" stroke="#475569" /><circle cx="130" cy="100" r="2.5" stroke="#475569" /><circle cx="100" cy="130" r="2.5" stroke="#475569" /><circle cx="70" cy="100" r="2.5" stroke="#475569" />
    </g>
    <g class="center-pulse">
        <circle cx="100" cy="100" r="7" fill="#ffffff" filter="url(#glow-heavy)" opacity="0.9" />
        <circle cx="100" cy="100" r="3" fill="#020617" />
    </g>
</svg>
